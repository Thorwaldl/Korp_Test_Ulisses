<h2>Produtos</h2>

<div *ngIf="error" style="color:red">{{ error }}</div>
<div *ngIf="success" style="color:green">{{ success }}</div>

<input placeholder="Código" [(ngModel)]="newProduct.codigo">
<input placeholder="Descrição" [(ngModel)]="newProduct.descricao">
<input type="number" [(ngModel)]="newProduct.saldo">

<button (click)="create()" [disabled]="loading">
  {{ loading ? 'Salvando...' : 'Criar' }}
</button>

<ul>
  <li *ngFor="let p of products">
    {{ p.codigo }} - {{ p.descricao }} (Saldo: {{ p.saldo }})
  </li>
</ul>
