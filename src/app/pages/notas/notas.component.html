<h2>Notas Fiscais</h2>

<!-- Mensagens -->
<div *ngIf="error" style="margin-bottom: 10px;">
  <mat-card style="background: #f44336; color: white;">
    {{ error }}
  </mat-card>
</div>

<div *ngIf="success" style="margin-bottom: 10px;">
  <mat-card style="background: #4caf50; color: white;">
    {{ success }}
  </mat-card>
</div>

<!-- Criar nota -->
<button mat-raised-button color="primary" (click)="create()" [disabled]="loading" style="margin-bottom: 20px;">
  {{ loading ? 'Processando...' : 'Criar Nota' }}
</button>

<!-- Lista de notas -->
<div style="display: flex; flex-direction: column; gap: 15px;">

  <mat-card *ngFor="let n of invoices">

    <!-- Cabeçalho -->
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <strong>Nº {{ n.numero }}</strong> - {{ n.status }}
      </div>

      <button mat-button color="accent" (click)="print(n.id!)" [disabled]="loading">
        Imprimir
      </button>
    </div>

    <!-- Adicionar item -->
    <div *ngIf="n.status === 'ABERTA'" style="margin-top: 15px; display: flex; gap: 10px; align-items: center;">

      <mat-form-field appearance="outline">
        <mat-label>Produto ID</mat-label>
        <input matInput type="number" [(ngModel)]="getItem(n.id!).produtoId">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Quantidade</mat-label>
        <input matInput type="number" [(ngModel)]="getItem(n.id!).quantidade">
      </mat-form-field>

      <button mat-raised-button color="primary"
              (click)="addItem(n.id!)"
              [disabled]="loading">
        Adicionar
      </button>

    </div>

    <!-- Itens -->
    <div style="margin-top: 10px;">
      <div *ngFor="let item of n.itens" style="padding: 5px 0; border-bottom: 1px solid #ddd;">
        Produto {{ item.produtoId }} — Qtd: {{ item.quantidade }}
      </div>
    </div>

  </mat-card>

</div>
